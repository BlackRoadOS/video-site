name = "roadview-video"
main = "src/worker.js"
compatibility_date = "2024-09-01"
workers_dev = false

routes = [
  { pattern = "video.blackroad.io/*", zone_name = "blackroad.io" },
  { pattern = "view.blackroad.io/*", zone_name = "blackroad.io" }
]

[[d1_databases]]
binding = "DB"
database_name = "roundtrip"
database_id = "ec4efdfb-a76e-46fb-a821-1278e17e7b90"

[durable_objects]
bindings = [
  { name = "ROOM", class_name = "VideoRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["VideoRoom"]
